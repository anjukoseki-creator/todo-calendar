<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3b82d9">
<title>TantoList — ToDoカレンダー by 小関</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #f4f6fa;
    --card: #fff;
    --text: #243047;
    --muted: #8b93a7;
    --accent: #3b82d9;
    --accent-light: #e8f1fc;
    --border: #e3e7ef;
    --high: #e85d75; --high-bg: #fdecef;
    --mid:  #f0a832; --mid-bg:  #fdf3e0;
    --low:  #43a878; --low-bg:  #e6f5ee;
    --done: #9aa0b5;
    --today-bg: #fff7e8;
    --shadow: 0 2px 10px rgba(36,48,71,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,system-ui,sans-serif; background: var(--bg); color: var(--text); }
  button { font-family: inherit; cursor: pointer; border: none; border-radius: 8px; font-size: .82rem; }
  button:hover { opacity: .88; }
  input, select, textarea { font-family: inherit; font-size: .85rem; padding: 7px 9px; border: 1px solid var(--border); border-radius: 8px; background: #fff; color: var(--text); }

  header { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 16px; background: var(--card); box-shadow: var(--shadow); position: sticky; top: 0; z-index: 20; flex-wrap: wrap; }
  header h1 { font-size: 1.05rem; display: flex; align-items: center; gap: 7px; }
  header h1 small { font-size: .68rem; color: var(--muted); font-weight: normal; }
  .hdr-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 10px; }
  .btn-accent { background: var(--accent); color: #fff; padding: 8px 14px; }
  .view-switch { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .view-switch button { border-radius: 0; padding: 6px 14px; background: #fff; color: var(--muted); }
  .view-switch button.active { background: var(--accent); color: #fff; }
  .overdue-badge { background: var(--high); color: #fff; border-radius: 999px; padding: 4px 10px; font-size: .72rem; display: none; }

  main { max-width: 1200px; margin: 16px auto; padding: 0 14px; display: grid; grid-template-columns: 1fr 330px; gap: 14px; align-items: start; }

  /* フローティング追加ボタン(モバイル) */
  .fab { display: none; position: fixed; right: 16px; bottom: 16px; width: 54px; height: 54px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 1.7rem; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(59,130,217,.45); z-index: 40; }

  .card { background: var(--card); border-radius: 14px; box-shadow: var(--shadow); padding: 14px; }
  .card h3 { font-size: .9rem; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .side { display: flex; flex-direction: column; gap: 14px; }

  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-nav h2 { font-size: 1.05rem; }
  .nav-btns button { background: var(--accent-light); color: var(--accent); padding: 6px 12px; font-weight: bold; }

  /* 月表示 */
  table.calendar { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .calendar th { font-size: .72rem; color: var(--muted); padding: 5px 0; font-weight: normal; }
  .calendar th.sun { color: var(--high); } .calendar th.sat { color: var(--accent); }
  .calendar td { border: 1px solid var(--border); vertical-align: top; height: 86px; padding: 3px; cursor: pointer; }
  .calendar td:hover { background: var(--accent-light); }
  .calendar td.other { background: #fafbfd; color: #c4c8d8; }
  .calendar td.today { background: var(--today-bg); }
  .calendar td.selected { outline: 2px solid var(--accent); outline-offset: -2px; }
  .day-num { font-size: .78rem; font-weight: bold; }
  td.sun-cell .day-num { color: var(--high); } td.sat-cell .day-num { color: var(--accent); }
  .cell-todos { margin-top: 2px; display: flex; flex-direction: column; gap: 2px; }
  .chip { font-size: .63rem; padding: 1px 4px 1px 6px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 3px solid transparent; display: flex; align-items: center; gap: 3px; }
  .imp-high { background: var(--high-bg); color: #c43d56; border-left-color: var(--high); }
  .imp-mid  { background: var(--mid-bg);  color: #b97c14; border-left-color: var(--mid); }
  .imp-low  { background: var(--low-bg);  color: #2e7d57; border-left-color: var(--low); }
  .chip.done { background: #f0f1f5 !important; color: var(--done) !important; text-decoration: line-through; border-left-color: var(--done) !important; }
  .chip.more { background: transparent; color: var(--muted); border: none; }

  /* 週・日表示 */
  .timegrid { display: grid; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .tg-head { display: grid; border-bottom: 1px solid var(--border); background: #fafbfd; }
  .tg-head .tg-day { padding: 6px 2px; text-align: center; font-size: .74rem; cursor: pointer; border-left: 1px solid var(--border); }
  .tg-head .tg-day:hover { background: var(--accent-light); }
  .tg-head .tg-day.today { background: var(--today-bg); }
  .tg-head .tg-day.selected { box-shadow: inset 0 -3px 0 var(--accent); }
  .tg-head .tg-day .dn { font-weight: bold; font-size: .9rem; }
  .tg-allday { display: grid; border-bottom: 1px solid var(--border); min-height: 26px; }
  .tg-allday .ad-cell { border-left: 1px solid var(--border); padding: 2px; display: flex; flex-direction: column; gap: 2px; }
  .tg-scroll { max-height: 460px; overflow-y: auto; }
  .tg-body { display: grid; position: relative; }
  .tg-hours { font-size: .62rem; color: var(--muted); }
  .tg-hours div { height: 44px; border-bottom: 1px solid #f0f2f7; padding: 2px 4px 0 0; text-align: right; }
  .tg-col { position: relative; border-left: 1px solid var(--border); }
  .tg-col .hline { height: 44px; border-bottom: 1px solid #f0f2f7; }
  .tg-evt { position: absolute; left: 2px; right: 2px; border-radius: 5px; font-size: .64rem; padding: 2px 4px; overflow: hidden; cursor: pointer; border-left: 3px solid; }
  .tg-evt.done { opacity: .55; text-decoration: line-through; }
  .ev-high { background: var(--high-bg); color: #c43d56; border-left-color: var(--high); }
  .ev-mid  { background: var(--mid-bg);  color: #b97c14; border-left-color: var(--mid); }
  .ev-low  { background: var(--low-bg);  color: #2e7d57; border-left-color: var(--low); }
  .nowline { position: absolute; left: 0; right: 0; height: 2px; background: var(--high); z-index: 5; pointer-events: none; }

  /* フォーム */
  .form { display: flex; flex-direction: column; gap: 8px; }
  .form .row { display: flex; gap: 6px; }
  .form .row > * { flex: 1; min-width: 0; }
  .form label { font-size: .68rem; color: var(--muted); margin-bottom: -4px; }
  .form-btns { display: flex; gap: 6px; }
  .form-btns .btn-accent { flex: 1; }
  #cancelEdit { display: none; background: #eef0f5; color: var(--muted); padding: 8px 12px; }

  /* リスト */
  .seg { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 8px; }
  .seg button { flex: 1; border-radius: 0; padding: 5px 0; background: #fff; color: var(--muted); font-size: .74rem; }
  .seg button.active { background: var(--accent); color: #fff; }
  .todo-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
  .todo-item { display: flex; align-items: center; gap: 7px; padding: 7px 9px; border: 1px solid var(--border); border-radius: 10px; border-left-width: 4px; cursor: pointer; }
  .todo-item.bl-high { border-left-color: var(--high); }
  .todo-item.bl-mid { border-left-color: var(--mid); }
  .todo-item.bl-low { border-left-color: var(--low); }
  .todo-item.overdue { background: var(--high-bg); }
  .todo-item input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); flex-shrink: 0; }
  .todo-item .title { flex: 1; font-size: .82rem; word-break: break-all; }
  .todo-item.done .title { text-decoration: line-through; color: var(--done); }
  .todo-item .meta { font-size: .64rem; color: var(--muted); text-align: right; flex-shrink: 0; line-height: 1.4; }
  .todo-item .del { background: transparent; color: var(--muted); font-size: .95rem; padding: 0 3px; flex-shrink: 0; }
  .todo-item .del:hover { color: var(--high); }
  .tag { font-size: .58rem; border-radius: 4px; padding: 1px 4px; margin-left: 3px; }
  .tag.rep { background: var(--accent-light); color: var(--accent); }
  .empty { color: var(--muted); font-size: .78rem; text-align: center; padding: 10px 0; }

  /* 振り返り */
  .rate-wrap { margin-bottom: 10px; }
  .rate-label { display: flex; justify-content: space-between; font-size: .74rem; color: var(--muted); margin-bottom: 4px; }
  .rate-bar { height: 12px; background: #edf0f6; border-radius: 999px; overflow: hidden; }
  .rate-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #6fb1f0); border-radius: 999px; transition: width .4s; }
  .review-form { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .review-form textarea { resize: vertical; min-height: 52px; }
  .review-history { list-style: none; display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
  .review-history li { background: #f8f9fc; border-radius: 8px; padding: 7px 9px; font-size: .76rem; }
  .review-history .rh-meta { font-size: .62rem; color: var(--muted); margin-bottom: 2px; display: flex; justify-content: space-between; }
  .review-history .rh-del { cursor: pointer; color: var(--muted); }
  .review-history .rh-del:hover { color: var(--high); }

  /* 月の目標 */
  .goal-line { display: flex; align-items: center; gap: 6px; margin: 0 0 10px; font-size: .82rem; }
  .goal-text { flex: 1; cursor: pointer; padding: 6px 10px; border-radius: 8px; background: #f8f9fc; border: 1px dashed transparent; transition: background .15s; }
  .goal-text:hover { background: var(--accent-light); }
  .goal-text.placeholder { color: var(--muted); border-color: var(--border); }
  .goal-input { flex: 1; }

  /* メモ(タブ式) */
  .memo-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .memo-tab { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 8px; background: #fff; font-size: .75rem; cursor: pointer; color: var(--muted); transition: background .15s; }
  .memo-tab:hover { background: var(--accent-light); }
  .memo-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: bold; }
  .memo-tab.add { font-weight: bold; color: var(--accent); background: var(--accent-light); border-color: transparent; }
  .memo-act { opacity: .75; padding: 0 1px; }
  .memo-act:hover { opacity: 1; }
  .memo-rename { font-size: .75rem; padding: 2px 5px; width: 100px; }
  .memo-area { width: 100%; min-height: 130px; resize: vertical; line-height: 1.6; }
  .memo-status { font-size: .64rem; color: var(--muted); text-align: right; margin-top: 4px; min-height: 1em; }

  /* トースト */
  #toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(90px); background: #243047; color: #fff; padding: 10px 18px; border-radius: 10px; font-size: .8rem; display: flex; gap: 14px; align-items: center; opacity: 0; transition: .25s; z-index: 50; box-shadow: 0 6px 20px rgba(0,0,0,.25); }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast button { background: transparent; color: #8ec2ff; font-weight: bold; padding: 0; font-size: .8rem; }

  /* 微調整 */
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,217,.14); }
  button:active { transform: scale(.97); }
  .calendar td { transition: background .12s; }
  .calendar td.today .day-num { background: var(--accent); color: #fff !important; width: 19px; height: 19px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: .68rem; }
  .todo-item { transition: box-shadow .15s; }
  .todo-item:hover { box-shadow: var(--shadow); }

  footer { text-align: center; color: var(--muted); font-size: .7rem; padding: 18px 0 26px; line-height: 1.8; }
  .legend { display: flex; gap: 10px; justify-content: center; font-size: .68rem; color: var(--muted); margin-top: 8px; flex-wrap: wrap; }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .lg { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

  /* AIプランナー */
  .ai-note { font-size: .68rem; color: var(--muted); line-height: 1.7; }
  .ai-note a { color: var(--accent); }
  .day-hours { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 2px; }
  .day-hours .dh { text-align: center; }
  .day-hours .dh span { display: block; font-size: .64rem; color: var(--muted); margin-bottom: 2px; }
  .day-hours .dh span.sat { color: var(--accent); } .day-hours .dh span.sun { color: var(--high); }
  .day-hours input { width: 100%; padding: 6px 2px; text-align: center; }
  .day-badge { display: inline-block; min-width: 1.5em; text-align: center; background: var(--accent-light); color: var(--accent); border-radius: 4px; font-size: .66rem; padding: 1px 3px; margin-right: 5px; flex-shrink: 0; }
  .ai-res { margin-top: 10px; border: 1px dashed var(--border); border-radius: 10px; padding: 10px; }
  .ai-res h4 { font-size: .8rem; margin-bottom: 6px; }
  .ai-res ul { list-style: none; display: flex; flex-direction: column; gap: 5px; }
  .ai-res li { font-size: .76rem; line-height: 1.5; }
  .ai-res a { color: var(--accent); font-weight: bold; text-decoration: none; }
  .ai-res a:hover { text-decoration: underline; }
  .ai-res .res-desc { color: var(--muted); }
  .ai-key-row { display: flex; gap: 6px; }
  .ai-key-row input { flex: 1; min-width: 0; }
  .ai-key-ok { display: flex; align-items: center; gap: 8px; font-size: .76rem; color: var(--low); }
  .ai-key-ok button { background: #eef0f5; color: var(--muted); padding: 4px 10px; }
  .ai-week { border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin-top: 10px; }
  .ai-week h4 { font-size: .84rem; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .ai-week h4 .wk-hours { font-size: .7rem; color: var(--muted); font-weight: normal; }
  .ai-week ul { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .ai-week li { font-size: .78rem; display: flex; align-items: center; gap: 5px; background: #f8f9fc; border-radius: 6px; padding: 4px 6px; }
  .ai-week li .hours { color: var(--muted); flex-shrink: 0; }
  .pl-day { padding: 4px 2px; font-size: .72rem; flex-shrink: 0; }
  .pl-title { flex: 1; min-width: 0; padding: 4px 6px; font-size: .74rem; background: transparent; border-color: transparent; }
  .pl-title:hover, .pl-title:focus { background: #fff; border-color: var(--border); }
  .pl-hours { width: 3.8em; padding: 4px 2px; font-size: .72rem; text-align: center; flex-shrink: 0; }
  .pl-del { background: transparent; color: var(--muted); padding: 0 4px; flex-shrink: 0; }
  .pl-del:hover { color: var(--high); }
  .pl-add { background: var(--accent-light); color: var(--accent); padding: 5px 12px; font-size: .72rem; margin-top: 8px; }
  .ai-advice { background: var(--accent-light); border-radius: 8px; padding: 8px 10px; font-size: .78rem; margin-top: 10px; line-height: 1.7; }
  .ai-actions { display: flex; gap: 8px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
  .ai-actions input[type=date] { padding: 7px 9px; }

  /* ===== モバイル最適化(末尾に置いて優先) ===== */
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; margin: 10px auto; padding: 0 8px; gap: 10px; }
    .card { padding: 10px; border-radius: 12px; }
    header { padding: 8px 10px; gap: 6px; }
    header h1 { font-size: .95rem; }
    header h1 small { display: none; }
    .btn-ghost { padding: 6px 8px; font-size: .74rem; }
    .view-switch button { padding: 6px 11px; }
    .cal-nav h2 { font-size: .95rem; }
    .calendar td { height: 62px; padding: 2px; }
    .chip { font-size: .58rem; padding-left: 4px; }
    .tg-scroll { max-height: 370px; }
    /* 入力時のiOS自動ズームを防ぐ */
    input, select, textarea { font-size: 16px; }
    /* カードの並び: 当日のToDo → 追加フォーム → 振り返り → メモ */
    #listCard { order: 1; }
    #formCard { order: 2; }
    #reviewCard { order: 3; }
    #memoCard { order: 4; }
    .todo-item { padding: 10px; }
    .todo-item input[type=checkbox] { width: 19px; height: 19px; }
    .memo-tab { padding: 6px 12px; }
    .fab { display: flex; }
    #toast { bottom: 84px; max-width: 92vw; }
  }
</style>
</head>
<body>
<header>
  <h1>✅ TantoList <small>ToDoカレンダー by 小関</small></h1>
  <div class="hdr-actions">
    <span id="overdueBadge" class="overdue-badge"></span>
    <div class="view-switch">
      <button data-view="month" class="active">月</button>
      <button data-view="week">週</button>
      <button data-view="day">日</button>
      <button data-view="ai">🧠プラン</button>
    </div>
    <button id="todayBtn" class="btn-ghost">今日へ</button>
    <button id="notifyBtn" class="btn-ghost">🔔 通知</button>
    <button id="exportBtn" class="btn-ghost">⬇ 書出</button>
    <button id="importBtn" class="btn-ghost">⬆ 読込</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </div>
</header>

<main>
  <section class="card" id="calSection">
    <div class="cal-nav">
      <h2 id="calTitle"></h2>
      <div class="nav-btns"><button id="prevBtn">‹</button> <button id="nextBtn">›</button></div>
    </div>
    <div class="goal-line" id="goalLine">🎯 <span id="goalText" class="goal-text"></span></div>
    <div id="calArea"></div>
    <div class="legend" id="legend"></div>
  </section>

  <section class="card" id="aiSection" style="display:none">
    <h3>🧠 目標プランナー <span style="font-size:.65rem;color:var(--muted);font-weight:normal">目標を週ごとのスケジュールに自動分解します</span></h3>
    <form class="form" id="aiForm">
      <input type="text" id="aiGoal" placeholder="目標(例: TOEIC 700点を取る)" maxlength="100" required>
      <div><label>進め方の希望(任意)</label>
        <textarea id="aiHow" style="width:100%;min-height:54px;resize:vertical" maxlength="300" placeholder="例: 平日はスキマ時間で単語中心、週末に問題演習をまとめて。リスニングを重点的に強化したい 等"></textarea>
      </div>
      <div class="row">
        <div><label>期間(週)</label><select id="aiWeeks" style="width:100%"></select></div>
        <div><label>タイプ</label>
          <select id="aiCat" style="width:100%">
            <option value="study">学習・資格</option>
            <option value="exercise">運動・健康</option>
            <option value="build">制作・開発</option>
            <option value="habit">習慣づくり</option>
            <option value="general">その他</option>
          </select>
        </div>
      </div>
      <div>
        <label>曜日ごとに使える時間(時間/日)</label>
        <div class="day-hours" id="dayHours"></div>
        <div class="ai-note" id="dayTotal" style="text-align:right"></div>
      </div>
      <div><label>作成エンジン</label>
        <select id="aiEngine" style="width:100%">
          <option value="chrome">Chrome内蔵AI(確認中…)</option>
          <option value="gemini">Gemini API(無料キー・スマホOK)</option>
          <option value="claude">Claude API(高品質・有料キー)</option>
          <option value="tpl" selected>テンプレート(AIなし・オフライン)</option>
        </select>
      </div>
      <div id="aiSetup" style="display:none"></div>
      <button type="submit" class="btn-accent" id="aiRun">⚡ プランを作成</button>
    </form>
    <div id="aiStatus" class="ai-note" style="margin-top:8px"></div>
    <div id="aiResult"></div>
  </section>

  <aside class="side">
    <div class="card" id="formCard">
      <h3 id="formTitle">➕ タスクを追加</h3>
      <form class="form" id="taskForm">
        <input type="text" id="fTitle" placeholder="タスク名" maxlength="100" required>
        <div class="row">
          <div><label>開始日</label><input type="date" id="fDate" required style="width:100%"></div>
          <div><label>終了日(任意)</label><input type="date" id="fEndDate" style="width:100%"></div>
        </div>
        <div class="row">
          <div><label>開始時刻</label><input type="time" id="fStart" style="width:100%"></div>
          <div><label>終了時刻</label><input type="time" id="fEnd" style="width:100%"></div>
        </div>
        <div class="row">
          <div><label>ジャンル</label>
            <select id="fGenre" style="width:100%"></select>
          </div>
          <div><label>重要度</label>
            <select id="fImp" style="width:100%">
              <option value="high">高 ‼</option>
              <option value="mid" selected>中 ！</option>
              <option value="low">低</option>
            </select>
          </div>
          <div><label>繰り返し</label>
            <select id="fRep" style="width:100%">
              <option value="none">なし</option>
              <option value="daily">毎日</option>
              <option value="weekly">毎週</option>
              <option value="monthly">毎月</option>
            </select>
          </div>
        </div>
        <div class="form-btns">
          <button type="submit" class="btn-accent" id="submitBtn">追加する</button>
          <button type="button" id="cancelEdit">取消</button>
        </div>
      </form>
    </div>

    <div class="card" id="listCard">
      <h3>📋 <span id="listTitle"></span></h3>
      <div class="seg" id="rangeSeg">
        <button data-range="day" class="active">日次</button>
        <button data-range="week">週次</button>
        <button data-range="month">月次</button>
      </div>
      <ul class="todo-list" id="todoList"></ul>
    </div>

    <div class="card" id="reviewCard">
      <h3>📈 振り返り</h3>
      <div class="seg" id="reviewSeg">
        <button data-rv="week" class="active">週次</button>
        <button data-rv="month">月次</button>
      </div>
      <div class="rate-wrap">
        <div class="rate-label"><span id="rateLabel"></span><strong id="rateValue"></strong></div>
        <div class="rate-bar"><div class="rate-fill" id="rateFill" style="width:0%"></div></div>
      </div>
      <div class="review-form">
        <textarea id="reviewText" placeholder="この期間の振り返りコメント"></textarea>
        <button type="button" class="btn-accent" id="reviewPost">コメントを投稿</button>
      </div>
      <ul class="review-history" id="reviewHistory"></ul>
    </div>

    <div class="card" id="memoCard">
      <h3>📝 メモ</h3>
      <div class="memo-tabs" id="memoTabs"></div>
      <textarea id="memoArea" class="memo-area" placeholder="買い物リスト、アイデア、連絡事項など自由にどうぞ(自動保存)"></textarea>
      <div class="memo-status" id="memoStatus"></div>
    </div>
  </aside>
</main>

<button class="fab" id="fabAdd" title="タスクを追加">＋</button>
<div id="toast"></div>

<footer>
  データはこのブラウザの localStorage に保存されます(サーバー送信なし)<br>
  バックアップや別端末への移行には「⬇ 書出」/「⬆ 読込」を使ってください
</footer>

<script>
(() => {
  const KEY = 'tantolist-v1';
  const pad = n => String(n).padStart(2, '0');
  const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const parse = s => { const [y,m,dd] = s.split('-').map(Number); return new Date(y, m-1, dd); };
  const todayStr = () => fmt(new Date());
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
  const $ = id => document.getElementById(id);
  const YOUBI = ['日','月','火','水','木','金','土'];
  const IMP_LABEL = { high:'高', mid:'中', low:'低' };
  const IMP_MARK = { high:'‼', mid:'！', low:'' };
  const REP_LABEL = { daily:'毎日', weekly:'毎週', monthly:'毎月' };
  const GENRES = {
    none:     { label: 'なし',     color: '#8d93a8' },
    study:    { label: '勉強',     color: '#3b82d9' },
    work:     { label: '仕事',     color: '#8e6fd8' },
    baito:    { label: 'バイト',   color: '#2bb3c0' },
    circle:   { label: 'サークル', color: '#f0a832' },
    shukatsu: { label: '就活',     color: '#e85d75' },
    life:     { label: '生活',     color: '#43a878' }
  };
  const genreOf = g => GENRES[g] || GENRES.none;
  const endOf = t => (t.endDate && t.endDate > t.date) ? t.endDate : t.date;

  // ===== 状態 =====
  const DEFAULTS = { tasks: [], comments: [], goals: {}, memos: [] };
  function normalize(s) {
    const st = Object.assign({}, DEFAULTS, s || {});
    delete st.members;
    if (!Array.isArray(st.memos)) st.memos = [];
    if (!st.memos.length) {
      const old = s && s.memo;
      st.memos = [{ id: uid(), title: 'メモ1', text: (old && old.text) || '', updatedAt: (old && old.updatedAt) || 0 }];
    }
    delete st.memo;
    return st;
  }
  let state = load();
  let viewMode = 'month';          // month | week | day
  let viewDate = new Date();
  let selectedDate = todayStr();
  let listRange = 'day';
  let reviewMode = 'week';
  let editingId = null;

  function load() {
    try {
      const s = JSON.parse(localStorage.getItem(KEY));
      if (s && s.tasks) return normalize(s);
    } catch {}
    // 旧版(todo-calendar-v1)からの移行
    let tasks = [];
    try {
      const old = JSON.parse(localStorage.getItem('todo-calendar-v1'));
      if (Array.isArray(old)) tasks = old.map(t => ({
        id: t.id, title: t.title, date: t.date, start: t.time || '', end: '',
        importance: 'mid', repeat: t.repeat || 'none',
        done: !!t.done, completedDates: t.completedDates || []
      }));
    } catch {}
    return normalize({ tasks });
  }
  function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

  // ===== タスクロジック =====
  function occursOn(t, ds) {
    if (t.repeat === 'none') return ds >= t.date && ds <= endOf(t);
    if (ds < t.date) return false;
    const d = parse(ds), s = parse(t.date);
    if (t.repeat === 'daily') return true;
    if (t.repeat === 'weekly') return d.getDay() === s.getDay();
    if (t.repeat === 'monthly') return d.getDate() === s.getDate();
    return false;
  }
  const isDone = (t, ds) => t.repeat === 'none' ? !!t.done : (t.completedDates||[]).includes(ds);
  function toggleDone(t, ds) {
    if (t.repeat === 'none') t.done = !t.done;
    else {
      t.completedDates = t.completedDates || [];
      const i = t.completedDates.indexOf(ds);
      i >= 0 ? t.completedDates.splice(i,1) : t.completedDates.push(ds);
    }
    save(); render();
  }
  function tasksOn(ds) {
    return state.tasks
      .filter(t => occursOn(t, ds))
      .sort((a,b) => (a.start||'99:99').localeCompare(b.start||'99:99'));
  }
  function overdue() {
    const td = todayStr();
    return state.tasks.filter(t => t.repeat==='none' && !t.done && endOf(t) < td)
      .sort((a,b) => a.date.localeCompare(b.date));
  }

  // ===== 期間ヘルパー =====
  function weekStart(d) { const x = new Date(d); x.setDate(x.getDate() - x.getDay()); return x; }
  function weekDates(d) { const s = weekStart(d); return [...Array(7)].map((_,i) => { const x = new Date(s); x.setDate(s.getDate()+i); return x; }); }
  function monthDates(d) {
    const y = d.getFullYear(), m = d.getMonth();
    const n = new Date(y, m+1, 0).getDate();
    return [...Array(n)].map((_,i) => new Date(y, m, i+1));
  }
  function periodDates(type, baseDs) {
    const b = parse(baseDs);
    return (type === 'week' ? weekDates(b) : monthDates(b)).map(fmt);
  }
  function periodKey(type, baseDs) {
    const b = parse(baseDs);
    return type === 'week' ? 'W' + fmt(weekStart(b)) : 'M' + baseDs.slice(0,7);
  }
  function periodLabel(type, baseDs) {
    const b = parse(baseDs);
    if (type === 'week') {
      const ds = weekDates(b);
      return `${ds[0].getMonth()+1}/${ds[0].getDate()}〜${ds[6].getMonth()+1}/${ds[6].getDate()}`;
    }
    return `${b.getFullYear()}年${b.getMonth()+1}月`;
  }

  // ===== 描画 =====
  function render() {
    renderCalendar(); renderGoal(); renderForm(); renderList(); renderReview(); renderOverdue();
  }

  // ===== モバイル補助 =====
  const isMobile = () => window.matchMedia('(max-width: 900px)').matches;
  function scrollToList() { if (isMobile()) $('listCard').scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  $('fabAdd').addEventListener('click', () => {
    $('formCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    setTimeout(() => $('fTitle').focus(), 350);
  });

  // ===== トースト =====
  let toastTimer;
  function toast(msg, undoFn) {
    const t = $('toast');
    t.innerHTML = '';
    t.appendChild(document.createTextNode(msg));
    if (undoFn) {
      const b = document.createElement('button');
      b.textContent = '元に戻す';
      b.addEventListener('click', () => { undoFn(); t.classList.remove('show'); });
      t.appendChild(b);
    }
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
  }

  // ===== 月の目標 =====
  const goalKey = () => `${viewDate.getFullYear()}-${pad(viewDate.getMonth()+1)}`;
  function renderGoal() {
    const el = $('goalText');
    if (!el) return;
    const txt = (state.goals || {})[goalKey()];
    el.textContent = txt || `${viewDate.getMonth()+1}月の目標を設定する…`;
    el.classList.toggle('placeholder', !txt);
  }
  $('goalLine').addEventListener('click', e => {
    if (e.target.id !== 'goalText') return;
    const key = goalKey();
    const input = document.createElement('input');
    input.type = 'text'; input.className = 'goal-input'; input.maxLength = 60;
    input.value = (state.goals || {})[key] || '';
    input.placeholder = '今月の目標を入力(Enterで保存・空欄で削除)';
    e.target.replaceWith(input);
    input.focus();
    let done = false;
    const commit = cancel => {
      if (done) return; done = true;
      if (!cancel) {
        state.goals = state.goals || {};
        const v = input.value.trim();
        if (v) state.goals[key] = v; else delete state.goals[key];
        save();
      }
      const span = document.createElement('span');
      span.id = 'goalText'; span.className = 'goal-text';
      input.replaceWith(span);
      renderGoal();
      if (!cancel) toast('目標を保存しました');
    };
    input.addEventListener('keydown', ev => {
      if (ev.key === 'Enter') commit(false);
      if (ev.key === 'Escape') commit(true);
    });
    input.addEventListener('blur', () => commit(false));
  });

  function renderCalendar() {
    const area = $('calArea');
    area.innerHTML = '';
    if (viewMode === 'month') { $('calTitle').textContent = `${viewDate.getFullYear()}年 ${viewDate.getMonth()+1}月`; area.appendChild(buildMonth()); }
    else if (viewMode === 'week') { const ds = weekDates(viewDate); $('calTitle').textContent = `${ds[0].getFullYear()}年 ${ds[0].getMonth()+1}/${ds[0].getDate()} 〜 ${ds[6].getMonth()+1}/${ds[6].getDate()}`; area.appendChild(buildTimeGrid(ds)); }
    else { $('calTitle').textContent = `${viewDate.getFullYear()}年 ${viewDate.getMonth()+1}月${viewDate.getDate()}日(${YOUBI[viewDate.getDay()]})`; area.appendChild(buildTimeGrid([new Date(viewDate)])); }
  }

  function chipFor(t, ds) {
    const c = document.createElement('div');
    const g = genreOf(t.genre);
    c.className = 'chip' + (isDone(t,ds) ? ' done' : '');
    if (!isDone(t, ds)) {
      c.style.background = g.color + '22';
      c.style.color = g.color;
      c.style.borderLeftColor = g.color;
    }
    const mark = IMP_MARK[t.importance] || '';
    const od = !isDone(t, ds) && endOf(t) < todayStr() && t.repeat === 'none' ? '⚠' : '';
    c.appendChild(document.createTextNode(od + mark + (t.start ? t.start+' ' : '') + t.title));
    c.title = `${t.title} [${g.label}/${IMP_LABEL[t.importance]}]`;
    return c;
  }

  function buildMonth() {
    const y = viewDate.getFullYear(), m = viewDate.getMonth();
    const tbl = document.createElement('table');
    tbl.className = 'calendar';
    tbl.innerHTML = '<thead><tr><th class="sun">日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th class="sat">土</th></tr></thead>';
    const tb = document.createElement('tbody');
    const td0 = todayStr();
    let cur = new Date(y, m, 1 - new Date(y,m,1).getDay());
    for (let w=0; w<6; w++) {
      const tr = document.createElement('tr');
      for (let dow=0; dow<7; dow++) {
        const td = document.createElement('td');
        const ds = fmt(cur);
        if (cur.getMonth() !== m) td.classList.add('other');
        if (ds === td0) td.classList.add('today');
        if (ds === selectedDate) td.classList.add('selected');
        if (dow===0) td.classList.add('sun-cell'); if (dow===6) td.classList.add('sat-cell');
        td.innerHTML = `<div class="day-num">${cur.getDate()}</div>`;
        const list = tasksOn(ds);
        if (list.length) {
          const wrap = document.createElement('div'); wrap.className = 'cell-todos';
          list.slice(0,3).forEach(t => wrap.appendChild(chipFor(t, ds)));
          if (list.length > 3) { const mo = document.createElement('div'); mo.className='chip more'; mo.textContent = `+${list.length-3}件`; wrap.appendChild(mo); }
          td.appendChild(wrap);
        }
        td.addEventListener('click', () => { selectedDate = ds; $('fDate').value = ds; render(); scrollToList(); });
        tr.appendChild(td);
        cur.setDate(cur.getDate()+1);
      }
      tb.appendChild(tr);
    }
    tbl.appendChild(tb);
    return tbl;
  }

  const HOUR_H = 44;
  function buildTimeGrid(dates) {
    const n = dates.length;
    const wrap = document.createElement('div'); wrap.className = 'timegrid';
    const cols = `46px repeat(${n}, 1fr)`;
    const td0 = todayStr();

    const head = document.createElement('div'); head.className = 'tg-head'; head.style.gridTemplateColumns = cols;
    head.appendChild(document.createElement('div'));
    dates.forEach(d => {
      const ds = fmt(d);
      const c = document.createElement('div');
      c.className = 'tg-day' + (ds===td0?' today':'') + (ds===selectedDate?' selected':'');
      c.innerHTML = `${YOUBI[d.getDay()]}<div class="dn">${d.getDate()}</div>`;
      c.addEventListener('click', () => { selectedDate = ds; $('fDate').value = ds; render(); scrollToList(); });
      head.appendChild(c);
    });
    wrap.appendChild(head);

    // 終日(時刻なし)行
    const ad = document.createElement('div'); ad.className = 'tg-allday'; ad.style.gridTemplateColumns = cols;
    const adl = document.createElement('div'); adl.style.cssText = 'font-size:.6rem;color:var(--muted);padding:4px;text-align:right'; adl.textContent = '終日'; ad.appendChild(adl);
    dates.forEach(d => {
      const ds = fmt(d);
      const cell = document.createElement('div'); cell.className = 'ad-cell';
      tasksOn(ds).filter(t => !t.start).forEach(t => {
        const ch = chipFor(t, ds);
        ch.addEventListener('click', e => { e.stopPropagation(); startEdit(t, ds); });
        cell.appendChild(ch);
      });
      ad.appendChild(cell);
    });
    wrap.appendChild(ad);

    const scroll = document.createElement('div'); scroll.className = 'tg-scroll';
    const body = document.createElement('div'); body.className = 'tg-body'; body.style.gridTemplateColumns = cols;
    const hours = document.createElement('div'); hours.className = 'tg-hours';
    for (let h=0; h<24; h++) { const hd = document.createElement('div'); hd.textContent = `${h}:00`; hours.appendChild(hd); }
    body.appendChild(hours);

    dates.forEach(d => {
      const ds = fmt(d);
      const col = document.createElement('div'); col.className = 'tg-col';
      for (let h=0; h<24; h++) col.appendChild(Object.assign(document.createElement('div'), {className:'hline'}));
      tasksOn(ds).filter(t => t.start).forEach((t, i) => {
        const [sh, sm] = t.start.split(':').map(Number);
        let endMin = sh*60 + sm + 60;
        if (t.end) { const [eh, em] = t.end.split(':').map(Number); endMin = eh*60 + em; }
        const top = (sh*60+sm) / 60 * HOUR_H;
        const height = Math.max(((endMin - (sh*60+sm)) / 60) * HOUR_H, 20);
        const ev = document.createElement('div');
        const g = genreOf(t.genre);
        ev.className = 'tg-evt' + (isDone(t,ds) ? ' done' : '');
        ev.style.background = g.color + '22';
        ev.style.color = g.color;
        ev.style.borderLeftColor = g.color;
        ev.style.top = top + 'px'; ev.style.height = height + 'px';
        if (i % 2 === 1) ev.style.left = '8px';
        ev.textContent = `${IMP_MARK[t.importance] || ''}${t.start}${t.end ? '-'+t.end : ''} ${t.title}`;
        ev.title = ev.textContent;
        ev.addEventListener('click', () => startEdit(t, ds));
        col.appendChild(ev);
      });
      if (ds === td0) {
        const now = new Date();
        const nl = document.createElement('div'); nl.className = 'nowline';
        nl.style.top = ((now.getHours()*60 + now.getMinutes())/60*HOUR_H) + 'px';
        col.appendChild(nl);
      }
      body.appendChild(col);
    });
    scroll.appendChild(body);
    wrap.appendChild(scroll);
    setTimeout(() => { scroll.scrollTop = 7 * HOUR_H; }, 0);
    return wrap;
  }

  // ===== フォーム =====
  // ジャンルselect初期化 + 凡例描画
  Object.entries(GENRES).forEach(([k, g]) => {
    const o = document.createElement('option'); o.value = k; o.textContent = g.label;
    $('fGenre').appendChild(o);
  });
  (() => {
    const lg = $('legend');
    Object.entries(GENRES).forEach(([k, g]) => {
      if (k === 'none') return;
      const s = document.createElement('span');
      s.innerHTML = `<i class="lg" style="background:${g.color}"></i>${g.label}`;
      lg.appendChild(s);
    });
    const imp = document.createElement('span');
    imp.textContent = '重要度: ‼高 ！中';
    lg.appendChild(imp);
  })();
  function renderForm() {
    if (!$('fDate').value) $('fDate').value = selectedDate;
  }
  function startEdit(t, ds) {
    editingId = t.id;
    selectedDate = ds;
    $('formTitle').textContent = '✏️ タスクを編集';
    $('fTitle').value = t.title; $('fDate').value = t.date;
    $('fEndDate').value = (t.endDate && t.endDate > t.date) ? t.endDate : '';
    $('fStart').value = t.start || ''; $('fEnd').value = t.end || '';
    $('fImp').value = t.importance; $('fRep').value = t.repeat;
    $('fGenre').value = t.genre || 'none';
    $('submitBtn').textContent = '更新する';
    $('cancelEdit').style.display = 'block';
    if (isMobile()) $('formCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    $('fTitle').focus();
  }
  function resetForm() {
    editingId = null;
    $('taskForm').reset();
    $('fImp').value = 'mid'; $('fRep').value = 'none'; $('fGenre').value = 'none';
    $('fEndDate').value = '';
    $('fDate').value = selectedDate;
    $('formTitle').textContent = '➕ タスクを追加';
    $('submitBtn').textContent = '追加する';
    $('cancelEdit').style.display = 'none';
  }
  $('taskForm').addEventListener('submit', e => {
    e.preventDefault();
    const title = $('fTitle').value.trim();
    if (!title) return;
    const data = {
      title, date: $('fDate').value || selectedDate,
      endDate: $('fEndDate').value || '',
      start: $('fStart').value || '', end: $('fEnd').value || '',
      importance: $('fImp').value, repeat: $('fRep').value,
      genre: $('fGenre').value || 'none'
    };
    if (data.end && data.start && data.end < data.start) { alert('終了時刻は開始より後にしてください'); return; }
    if (data.endDate && data.endDate < data.date) { alert('終了日は開始日以降にしてください'); return; }
    if (data.endDate && data.repeat !== 'none') { alert('繰り返しタスクには終了日(複数日)は設定できません'); return; }
    if (editingId) {
      const t = state.tasks.find(x => x.id === editingId);
      if (t) Object.assign(t, data);
    } else {
      state.tasks.push({ id: uid(), ...data, done: false, completedDates: [] });
    }
    selectedDate = data.date;
    viewDate = parse(data.date);
    const wasEdit = !!editingId;
    save(); resetForm(); render();
    toast(wasEdit ? '更新しました' : '追加しました');
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && editingId) resetForm(); });
  $('cancelEdit').addEventListener('click', () => { resetForm(); });

  // ===== リスト =====
  function renderList() {
    const lbl = { day: labelOf(selectedDate), week: periodLabel('week', selectedDate)+' の週', month: periodLabel('month', selectedDate) };
    $('listTitle').textContent = lbl[listRange] + ' のToDo';
    const ul = $('todoList');
    ul.innerHTML = '';
    let items = [];
    if (listRange === 'day') items = tasksOn(selectedDate).map(t => [t, selectedDate]);
    else periodDates(listRange === 'week' ? 'week' : 'month', selectedDate)
      .forEach(ds => tasksOn(ds).forEach(t => items.push([t, ds])));
    if (!items.length) { ul.innerHTML = '<li class="empty">ToDoはありません</li>'; }
    items.forEach(([t, ds]) => ul.appendChild(listItem(t, ds, listRange !== 'day')));
    // 期限切れ
    const ov = overdue();
    if (ov.length) {
      const h = document.createElement('li'); h.className = 'empty'; h.style.cssText = 'color:var(--high);text-align:left;font-weight:bold;padding:6px 0 0';
      h.textContent = `⚠️ 期限切れ ${ov.length}件`;
      ul.appendChild(h);
      ov.forEach(t => ul.appendChild(listItem(t, t.date, true)));
    }
  }
  function labelOf(ds) { const d = parse(ds); return `${d.getMonth()+1}/${d.getDate()}(${YOUBI[d.getDay()]})`; }
  function listItem(t, ds, showDate) {
    const li = document.createElement('li');
    li.className = 'todo-item';
    const g = genreOf(t.genre);
    li.style.borderLeftColor = g.color;
    const done = isDone(t, ds);
    if (done) li.classList.add('done');
    else if (ds < todayStr()) li.classList.add('overdue');
    const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = done;
    cb.addEventListener('click', e => e.stopPropagation());
    cb.addEventListener('change', () => toggleDone(t, ds));
    const sp = document.createElement('span'); sp.className = 'title';
    sp.textContent = t.title;
    sp.insertAdjacentHTML('beforeend',
      (t.genre && t.genre !== 'none' ? `<span class="tag" style="background:${g.color}22;color:${g.color}">${g.label}</span>` : '') +
      `<span class="tag" style="background:#f0f1f5;color:#555">${IMP_MARK[t.importance] || ''}${IMP_LABEL[t.importance]}</span>` +
      (t.repeat !== 'none' ? `<span class="tag rep">🔁${REP_LABEL[t.repeat]}</span>` : ''));

  function generatePlan(goal, weeks, dayHours, cat) {
    const tpl = PLAN_TPL[cat] || PLAN_TPL.general;
    const plan = { weeks: [], advice: tpl.advice, resources: tpl.res || [] };
    for (let w = 1; w <= weeks; w++) {
      const pos = (w - .5) / weeks;  // 週の中央位置 0..1
      let acc = 0, phase = tpl.phases[tpl.phases.length - 1];
      for (const p of tpl.phases) { acc += p.ratio; if (pos <= acc) { phase = p; break; } }
      const tasks = [];
      let k = w - 1;
      DAY_ORDER.forEach(d => {
        let h = dayHours[d] || 0;
        while (h > 0) {
          const use = Math.min(2, h);
          tasks.push({ title: phase.tasks[k++ % phase.tasks.length], hours: Math.round(use * 10) / 10, day: d });
          h -= use;
        }
      });
      plan.weeks.push({ week: w, theme: phase.name, tasks });
    }
    return plan;
  }

  function parsePlan(text, weeks, dayHours) {
    const s = text.indexOf('{'), e = text.lastIndexOf('}');

    const plan = JSON.parse(text.slice(s, e + 1));

    const okDays = DAY_ORDER.filter(d => (dayHours[d] || 0) > 0);
    plan.weeks = plan.weeks.slice(0, weeks).map((w, i) => ({

    if (!plan.weeks.length) throw new Error('AIの応答にタスクがありませんでした');

    if (!key) throw new Error('先にAPIキーを設定してください');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 4000, messages: [{ role: 'user', content: prompt }] })
    });
    if (!res.ok) {
      if (res.status === 401) throw new Error('APIキーが無効です');
      if (res.status === 429) throw new Error('API利用上限に達しています');
      throw new Error(`APIエラー(${res.status})`);
    }
    const data = await res.json();
    return (data.content?.[0]?.text || '').trim();
  }
  const GEMINI_KEY = 'tantolist-gemini-key';
  const KEY_CONF = {
    claude: { store: AI_KEY, prefixes: ['sk-ant-'], hint: 'sk-ant-…', label: 'Anthropic APIキー', url: 'https://console.anthropic.com/', urlLabel: 'console.anthropic.com', note: '従量課金' },
    gemini: { store: GEMINI_KEY, prefixes: ['AIza', 'AQ.'], hint: 'AIza… または AQ.…', label: 'Google AI (Gemini) APIキー', url: 'https://aistudio.google.com/apikey', urlLabel: 'aistudio.google.com/apikey', note: '無料枠あり・クレジットカード不要' }
  };
  function renderAiSetup() {
    const wrap = $('aiSetup');
    const conf = KEY_CONF[$('aiEngine').value];
    wrap.innerHTML = '';
    if (!conf) return;
    if (localStorage.getItem(conf.store)) {
      const row = document.createElement('div');
      row.className = 'ai-key-ok';
      row.appendChild(document.createTextNode(`✓ ${conf.label}設定済み`));
      const chg = document.createElement('button'); chg.type = 'button'; chg.textContent = 'キーを削除';
      chg.addEventListener('click', () => { localStorage.removeItem(conf.store); renderAiSetup(); });
      row.appendChild(chg);
      wrap.appendChild(row);
      return;
    }
    const note = document.createElement('p');
    note.className = 'ai-note';
    const a = document.createElement('a');
    a.href = conf.url; a.target = '_blank'; a.rel = 'noopener'; a.textContent = conf.urlLabel;
    note.append(`${conf.label}が必要です(`, a, ` で取得、${conf.note})。キーはこの端末のブラウザ内にのみ保存され、該当のAPI以外には送信されません。「書出」ファイルにも含まれません。`);
    const row = document.createElement('div');
    row.className = 'ai-key-row';
    const inp = document.createElement('input');
    inp.type = 'password'; inp.placeholder = `${conf.hint} で始まるAPIキー`; inp.autocomplete = 'off';
    const btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'btn-accent'; btn.textContent = '保存';
    btn.addEventListener('click', () => {
      const v = inp.value.trim();
      if (!conf.prefixes.some(p => v.startsWith(p))) { alert(`${conf.hint} で始まるAPIキーを入力してください`); return; }
      localStorage.setItem(conf.store, v);
      renderAiSetup(); toast('APIキーを保存しました');
    });
    row.append(inp, btn);
    wrap.append(note, row);
  }
  function updateEngineUI() {
    const v = $('aiEngine').value;
    $('aiSetup').style.display = (v === 'claude' || v === 'gemini') ? '' : 'none';
    renderAiSetup();
  }
  $('aiEngine').addEventListener('change', updateEngineUI);
  (async () => {
    const avail = await chromeAIAvail();
    const opt = $('aiEngine').querySelector('option[value="chrome"]');
    if (avail === 'unavailable') {
      opt.disabled = true;
      opt.textContent = 'Chrome内蔵AI(この環境では利用不可)';
      // スマホ等ではGeminiを既定に(キー設定済みなら即使える)
      $('aiEngine').value = localStorage.getItem(GEMINI_KEY) ? 'gemini' : 'tpl';
    } else {
      opt.textContent = avail === 'available' ? 'Chrome内蔵AI(無料・利用可)' : 'Chrome内蔵AI(無料・初回はモデルDL)';
      $('aiEngine').value = 'chrome';
    }
    updateEngineUI();
  })();
  function renderAiPlan() {
    const saved = state.aiPlan;
    const box = $('aiResult');
    box.innerHTML = '';
    if (!saved) return;
    const { goal, plan } = saved;
    const dh = saved.dayHours || {};
    const weeklyTotal = Math.round(DAY_ORDER.reduce((a, d) => a + (dh[d] || 0), 0) * 10) / 10;
    const head = document.createElement('p');
    head.className = 'ai-note';
    head.style.marginTop = '12px';
    head.textContent = `📌 プラン: ${goal}`;
    box.appendChild(head);
    plan.weeks.forEach(wk => {
      const card = document.createElement('div');
      card.className = 'ai-week';
      const h = document.createElement('h4');
      const total = (wk.tasks || []).reduce((a, t) => a + (Number(t.hours) || 0), 0);
      const tt = document.createElement('span');
      tt.textContent = `第${wk.week}週: ${wk.theme || ''}`;
      const hh = document.createElement('span');
      hh.className = 'wk-hours';
      hh.textContent = `計${Math.round(total * 10) / 10}h / 確保${weeklyTotal}h`;
      h.append(tt, hh);
      card.appendChild(h);
      const ul = document.createElement('ul');
      const sorted = [...(wk.tasks || [])].sort((a, b) => DAY_ORDER.indexOf(a.day) - DAY_ORDER.indexOf(b.day));
      sorted.forEach(t => {
        const li = document.createElement('li');
        const dsel = document.createElement('select'); dsel.className = 'pl-day'; dsel.title = '曜日';
        DAY_ORDER.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; dsel.appendChild(o); });
        dsel.value = DAY_ORDER.includes(t.day) ? t.day : '月';
        dsel.addEventListener('change', () => { t.day = dsel.value; save(); renderAiPlan(); });
        const ti = document.createElement('input');
        ti.type = 'text'; ti.className = 'pl-title'; ti.value = t.title; ti.maxLength = 80; ti.title = 'クリックして編集';
        ti.addEventListener('change', () => { const v = ti.value.trim(); if (v) t.title = v; save(); });
        const hi = document.createElement('input');
        hi.type = 'number'; hi.className = 'pl-hours'; hi.min = 0.5; hi.max = 12; hi.step = 0.5; hi.value = t.hours; hi.title = '時間';
        hi.addEventListener('change', () => { t.hours = Math.max(.5, Math.min(12, Number(hi.value) || 1)); save(); renderAiPlan(); });
        const del = document.createElement('button');
        del.type = 'button'; del.className = 'pl-del'; del.textContent = '✕'; del.title = 'このタスクを削除';
        del.addEventListener('click', () => { wk.tasks = wk.tasks.filter(x => x !== t); save(); renderAiPlan(); });
        li.append(dsel, ti, hi, del);
        ul.appendChild(li);
      });
      card.appendChild(ul);
      const addT = document.createElement('button');
      addT.type = 'button'; addT.className = 'pl-add'; addT.textContent = '＋ タスクを追加';
      addT.addEventListener('click', () => {
        wk.tasks.push({ title: '新しいタスク', hours: 1, day: DAY_ORDER[0] });
        save(); renderAiPlan();
      });
      card.appendChild(addT);
      box.appendChild(card);
    });
    const editNote = document.createElement('p');
    editNote.className = 'ai-note';
    editNote.style.marginTop = '6px';
    editNote.textContent = '✏️ 曜日・タスク名・時間は直接編集できます(自動保存)。✕で削除、＋で追加';
    box.appendChild(editNote);
    if ((plan.resources || []).length) {
      const res = document.createElement('div');
      res.className = 'ai-res';
      const rh = document.createElement('h4'); rh.textContent = '📚 参考リソース(ソース)';
      res.appendChild(rh);
      const rul = document.createElement('ul');
      plan.resources.forEach(r => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = 'https://www.google.com/search?q=' + encodeURIComponent(`${goal} ${r.name}`);
        a.target = '_blank'; a.rel = 'noopener noreferrer';
        a.textContent = r.name + ' 🔎';
        li.appendChild(a);
        if (r.desc) {
          const d = document.createElement('span'); d.className = 'res-desc'; d.textContent = ' — ' + r.desc;
          li.appendChild(d);
        }
        rul.appendChild(li);
      });
      res.appendChild(rul);
      const note = document.createElement('p');
      note.className = 'ai-note';
      note.textContent = '※ リソース名はAI生成のため、リンク先の検索結果で実在と内容をご確認ください';
      res.appendChild(note);
      box.appendChild(res);
    }
    if (plan.advice) {
      const ad = document.createElement('div');
      ad.className = 'ai-advice';
      ad.textContent = '💡 ' + plan.advice;
      box.appendChild(ad);
    }
    const actions = document.createElement('div');
    actions.className = 'ai-actions';
    const glbl = document.createElement('span'); glbl.className = 'ai-note'; glbl.textContent = 'ジャンル:';
    const gsel = document.createElement('select');
    Object.entries(GENRES).forEach(([k, g]) => {
      const o = document.createElement('option'); o.value = k; o.textContent = g.label; gsel.appendChild(o);
    });
    const CAT2GENRE = { study: 'study', exercise: 'life', build: 'work', habit: 'life', general: 'none' };
    gsel.value = saved.genre || CAT2GENRE[saved.cat] || 'none';
    gsel.addEventListener('change', () => { saved.genre = gsel.value; save(); });
    const lbl = document.createElement('span'); lbl.className = 'ai-note'; lbl.textContent = '開始日:';
    const dateInp = document.createElement('input');
    dateInp.type = 'date'; dateInp.value = nextMonday();
    const reg = document.createElement('button');
    reg.type = 'button'; reg.className = 'btn-accent'; reg.textContent = '📅 カレンダーに登録';
    reg.addEventListener('click', () => {
      if (!dateInp.value) return;
      if (!confirm('プランの全タスクをカレンダーに登録しますか?')) return;
      const start = parse(dateInp.value);
      const prefix = goal.length > 12 ? goal.slice(0, 12) + '…' : goal;
      let count = 0;
      plan.weeks.forEach((wk, wi) => {
        (wk.tasks || []).forEach((t, ti) => {
          const weekStart = new Date(start);
          weekStart.setDate(start.getDate() + wi * 7);
          const dayIdx = YOUBI.indexOf(t.day);
          const offset = dayIdx >= 0 ? (dayIdx - weekStart.getDay() + 7) % 7 : Math.min(6, ti);
          const d = new Date(weekStart);
          d.setDate(weekStart.getDate() + offset);
          state.tasks.push({ id: uid(), title: `${prefix}: ${t.title}`, date: fmt(d), endDate: '', start: '', end: '', importance: 'mid', repeat: 'none', genre: gsel.value, done: false, completedDates: [] });
          count++;
        });
      });
      // 月の目標にも反映(未設定の月のみ)
      const gk = `${start.getFullYear()}-${pad(start.getMonth() + 1)}`;
      state.goals = state.goals || {};
      if (!state.goals[gk]) state.goals[gk] = goal;
      save();
      selectedDate = dateInp.value;
      viewDate = parse(dateInp.value);
      setView('month');
      render();
      toast(`${count}件のタスクをカレンダーに登録しました`);
    });
    actions.append(glbl, gsel, lbl, dateInp, reg);
    box.appendChild(actions);
  }
  $('aiForm').addEventListener('submit', async e => {
    e.preventDefault();
    const goal = $('aiGoal').value.trim();
    if (!goal) return;
    const weeks = Number($('aiWeeks').value);
    const dayHours = getDayHours();
    const total = DAY_ORDER.reduce((a, d) => a + dayHours[d], 0);
    if (total <= 0) { $('aiStatus').textContent = '⚠️ 少なくとも1つの曜日に時間を設定してください'; return; }
    const cat = $('aiCat').value;
    const how = $('aiHow').value.trim();
    const engine = $('aiEngine').value;
    const finish = (plan, usedEngine) => {
      state.aiPlan = { goal, weeks, dayHours, cat, how, engine: usedEngine, plan, createdAt: Date.now() };
      save(); renderAiPlan();
    };
    if (engine === 'tpl') {
      finish(generatePlan(goal, weeks, dayHours, cat), 'tpl');
      $('aiStatus').textContent = '';
      toast('プランができました');
      return;
    }
    $('aiRun').disabled = true;
    $('aiStatus').textContent = engine === 'chrome'
      ? '🤖 端末内AIがプランを作成中…(初回はモデルのダウンロードで数分かかることがあります)'
      : '🤖 AIがプランを作成中…(10〜30秒ほど)';
    try {
      const prompt = buildPrompt(goal, weeks, dayHours, cat, how);
      const text = engine === 'chrome' ? await callChromeAI(prompt)
        : engine === 'gemini' ? await callGemini(prompt)
        : await callClaude(prompt);
      finish(parsePlan(text, weeks, dayHours), engine);
      $('aiStatus').textContent = '';
      toast('AIプランができました');
    } catch (err) {
      finish(generatePlan(goal, weeks, dayHours, cat), 'tpl');
      $('aiStatus').textContent = `⚠️ ${err.message || 'AIエラー'} — 代わりにテンプレートで作成しました`;
    } finally {
      $('aiRun').disabled = false;
    }
  });
  renderAiPlan();
  if (state.aiPlan) {
    $('aiGoal').value = state.aiPlan.goal;
    $('aiWeeks').value = state.aiPlan.weeks;
    if (state.aiPlan.how) $('aiHow').value = state.aiPlan.how;
    if (state.aiPlan.cat) $('aiCat').value = state.aiPlan.cat;
    if (state.aiPlan.dayHours) {
      document.querySelectorAll('#dayHours input').forEach(i => {
        if (state.aiPlan.dayHours[i.dataset.day] != null) i.value = state.aiPlan.dayHours[i.dataset.day];
      });
      updateDayTotal();
    }
  }

  // ===== PWA =====
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // ===== メモ(タブ式・自動保存) =====
  let activeMemoId = state.memos[0].id;
  let memoTimer = null;
  const fmtDT = ts => { const d = new Date(ts); return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${pad(d.getMinutes())}`; };
  const activeMemo = () => state.memos.find(m => m.id === activeMemoId) || state.memos[0];
  function flushMemo() {
    if (!memoTimer) return;
    clearTimeout(memoTimer); memoTimer = null;
    const m = activeMemo();
    m.text = $('memoArea').value; m.updatedAt = Date.now();
    save();
  }
  function renderMemo() {
    const tabs = $('memoTabs');
    tabs.innerHTML = '';
    state.memos.forEach(m => {
      const tab = document.createElement('div');
      tab.className = 'memo-tab' + (m.id === activeMemoId ? ' active' : '');
      const name = document.createElement('span');
      name.textContent = m.title;
      tab.appendChild(name);
      if (m.id === activeMemoId) {
        const rn = document.createElement('span'); rn.className = 'memo-act'; rn.title = '名前を変更'; rn.textContent = '✎';
        rn.addEventListener('click', e => { e.stopPropagation(); renameMemo(m, name); });
        const del = document.createElement('span'); del.className = 'memo-act'; del.title = 'このメモを削除'; del.textContent = '✕';
        del.addEventListener('click', e => {
          e.stopPropagation();
          if (state.memos.length === 1) { alert('最後のメモは削除できません'); return; }
          if (($('memoArea').value || '').trim() && !confirm(`メモ「${m.title}」を削除しますか?`)) return;
          clearTimeout(memoTimer); memoTimer = null;
          state.memos = state.memos.filter(x => x.id !== m.id);
          activeMemoId = state.memos[0].id;
          save(); renderMemo();
          toast('メモを削除しました');
        });
        tab.append(rn, del);
      }
      tab.addEventListener('click', () => {
        if (m.id === activeMemoId) return;
        flushMemo();
        activeMemoId = m.id;
        renderMemo();
      });
      tab.addEventListener('dblclick', () => { if (m.id === activeMemoId) renameMemo(m, name); });
      tabs.appendChild(tab);
    });
    const add = document.createElement('div');
    add.className = 'memo-tab add'; add.textContent = '＋'; add.title = '新しいメモを追加';
    add.addEventListener('click', () => {
      flushMemo();
      const m = { id: uid(), title: `メモ${state.memos.length + 1}`, text: '', updatedAt: 0 };
      state.memos.push(m);
      activeMemoId = m.id;
      save(); renderMemo();
      $('memoArea').focus();
    });
    tabs.appendChild(add);
    const m = activeMemo();
    $('memoArea').value = m.text || '';
    $('memoStatus').textContent = m.updatedAt ? `最終保存: ${fmtDT(m.updatedAt)}` : '';
  }
  function renameMemo(m, nameEl) {
    const input = document.createElement('input');
    input.type = 'text'; input.value = m.title; input.maxLength = 15; input.className = 'memo-rename';
    nameEl.replaceWith(input);
    input.focus(); input.select();
    let done = false;
    const commit = cancel => {
      if (done) return; done = true;
      if (!cancel) { const v = input.value.trim(); if (v) m.title = v; save(); }
      renderMemo();
    };
    input.addEventListener('click', e => e.stopPropagation());
    input.addEventListener('keydown', ev => {
      if (ev.key === 'Enter') commit(false);
      if (ev.key === 'Escape') commit(true);
    });
    input.addEventListener('blur', () => commit(false));
  }
  $('memoArea').addEventListener('input', () => {
    clearTimeout(memoTimer);
    $('memoStatus').textContent = '入力中…';
    memoTimer = setTimeout(() => {
      memoTimer = null;
      const m = activeMemo();
      m.text = $('memoArea').value;
      m.updatedAt = Date.now();
      save();
      $('memoStatus').textContent = `✓ 保存しました ${fmtDT(m.updatedAt)}`;
    }, 500);
  });
  window.addEventListener('beforeunload', flushMemo);
  renderMemo();

  $('fDate').value = selectedDate;
  updateNotifyBtn();
  render();
  checkNotify();
})();
</script>
</body>
</html>

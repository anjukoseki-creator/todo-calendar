<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToDoカレンダー</title>
<style>
  :root {
    --bg: #f6f7fb;
    --card: #ffffff;
    --text: #2b2d42;
    --muted: #8d93a8;
    --accent: #5b6cff;
    --accent-light: #eef0ff;
    --danger: #e85d75;
    --danger-light: #fdecef;
    --done: #9aa0b5;
    --today: #fff4e0;
    --border: #e6e8f0;
    --shadow: 0 2px 12px rgba(43,45,66,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, system-ui, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; background: var(--card); box-shadow: var(--shadow);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
  header h1 .logo { font-size: 1.3rem; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  button {
    font-family: inherit; cursor: pointer; border: none; border-radius: 8px;
    font-size: .85rem; transition: opacity .15s, background .15s;
  }
  button:hover { opacity: .85; }
  .btn-ghost { background: transparent; color: var(--muted); padding: 6px 10px; border: 1px solid var(--border); }
  .btn-accent { background: var(--accent); color: #fff; padding: 8px 14px; }
  .overdue-badge {
    background: var(--danger); color: #fff; border-radius: 999px;
    padding: 4px 10px; font-size: .75rem; display: none;
  }
  main { max-width: 1100px; margin: 20px auto; padding: 0 16px; display: grid; grid-template-columns: 1fr 320px; gap: 16px; }
  @media (max-width: 860px) { main { grid-template-columns: 1fr; } }

  /* カレンダー */
  .calendar-card { background: var(--card); border-radius: 14px; box-shadow: var(--shadow); padding: 16px; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-nav h2 { font-size: 1.15rem; }
  .cal-nav .nav-btns { display: flex; gap: 6px; }
  .nav-btns button { background: var(--accent-light); color: var(--accent); padding: 6px 12px; font-weight: bold; }
  table.calendar { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .calendar th { font-size: .75rem; color: var(--muted); padding: 6px 0; font-weight: normal; }
  .calendar th.sun { color: var(--danger); }
  .calendar th.sat { color: var(--accent); }
  .calendar td {
    border: 1px solid var(--border); vertical-align: top; height: 88px;
    padding: 4px; cursor: pointer; transition: background .15s;
  }
  .calendar td:hover { background: var(--accent-light); }
  .calendar td.other { background: #fafbfd; color: #c4c8d8; }
  .calendar td.today { background: var(--today); }
  .calendar td.selected { outline: 2px solid var(--accent); outline-offset: -2px; }
  .day-num { font-size: .8rem; font-weight: bold; }
  td.sun-cell .day-num { color: var(--danger); }
  td.sat-cell .day-num { color: var(--accent); }
  .cell-todos { margin-top: 2px; display: flex; flex-direction: column; gap: 2px; }
  .chip {
    font-size: .65rem; padding: 1px 5px; border-radius: 4px;
    background: var(--accent-light); color: var(--accent);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .chip.done { background: #f0f1f5; color: var(--done); text-decoration: line-through; }
  .chip.overdue { background: var(--danger-light); color: var(--danger); }
  .chip.more { background: transparent; color: var(--muted); }

  /* サイドパネル */
  .side { display: flex; flex-direction: column; gap: 16px; }
  .panel { background: var(--card); border-radius: 14px; box-shadow: var(--shadow); padding: 16px; }
  .panel h3 { font-size: .95rem; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .add-form { display: flex; flex-direction: column; gap: 8px; }
  .add-form input[type="text"], .add-form input[type="time"], .add-form select {
    font-family: inherit; font-size: .85rem; padding: 8px 10px;
    border: 1px solid var(--border); border-radius: 8px; width: 100%;
    background: #fff; color: var(--text);
  }
  .add-form .row { display: flex; gap: 8px; }
  .todo-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .todo-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border: 1px solid var(--border); border-radius: 10px; background: #fff;
  }
  .todo-item.overdue { border-color: var(--danger); background: var(--danger-light); }
  .todo-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
  .todo-item .title { flex: 1; font-size: .85rem; word-break: break-all; }
  .todo-item.done .title { text-decoration: line-through; color: var(--done); }
  .todo-item .meta { font-size: .68rem; color: var(--muted); flex-shrink: 0; }
  .todo-item .del { background: transparent; color: var(--muted); font-size: 1rem; padding: 0 4px; flex-shrink: 0; }
  .todo-item .del:hover { color: var(--danger); }
  .empty { color: var(--muted); font-size: .8rem; text-align: center; padding: 12px 0; }
  .repeat-tag { font-size: .6rem; background: var(--accent-light); color: var(--accent); border-radius: 4px; padding: 1px 4px; }
  .overdue-section .todo-item { border-color: var(--danger-light); }
  footer { text-align: center; color: var(--muted); font-size: .72rem; padding: 20px 0 30px; }
</style>
</head>
<body>
<header>
  <h1><span class="logo">🗓️</span>ToDoカレンダー</h1>
  <div class="header-actions">
    <span id="overdueBadge" class="overdue-badge"></span>
    <button id="notifyBtn" class="btn-ghost">🔔 通知を有効化</button>
    <button id="todayBtn" class="btn-ghost">今日へ</button>
  </div>
</header>

<main>
  <section class="calendar-card">
    <div class="cal-nav">
      <h2 id="calTitle"></h2>
      <div class="nav-btns">
        <button id="prevBtn">‹</button>
        <button id="nextBtn">›</button>
      </div>
    </div>
    <table class="calendar">
      <thead>
        <tr>
          <th class="sun">日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th class="sat">土</th>
        </tr>
      </thead>
      <tbody id="calBody"></tbody>
    </table>
  </section>

  <aside class="side">
    <div class="panel">
      <h3>➕ <span id="addDateLabel"></span> に追加</h3>
      <form class="add-form" id="addForm">
        <input type="text" id="titleInput" placeholder="タスク名を入力" maxlength="100" required>
        <div class="row">
          <input type="time" id="timeInput">
          <select id="repeatInput">
            <option value="none">繰り返しなし</option>
            <option value="daily">毎日</option>
            <option value="weekly">毎週</option>
            <option value="monthly">毎月</option>
          </select>
        </div>
        <button type="submit" class="btn-accent">追加する</button>
      </form>
    </div>

    <div class="panel">
      <h3>📋 <span id="listDateLabel"></span> のToDo</h3>
      <ul class="todo-list" id="todoList"></ul>
    </div>

    <div class="panel overdue-section" id="overduePanel" style="display:none">
      <h3>⚠️ 期限切れ</h3>
      <ul class="todo-list" id="overdueList"></ul>
    </div>
  </aside>
</main>

<footer>データはこのブラウザの localStorage に保存されます</footer>

<script>
(() => {
  const STORAGE_KEY = 'todo-calendar-v1';
  const pad = n => String(n).padStart(2, '0');
  const fmt = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  const parse = s => { const [y, m, dd] = s.split('-').map(Number); return new Date(y, m - 1, dd); };
  const todayStr = () => fmt(new Date());

  let todos = load();
  let viewDate = new Date();      // 表示中の月
  let selectedDate = todayStr();  // 選択中の日付

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); }
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

  // 指定日にタスクが発生するか(繰り返しルール対応)
  function occursOn(todo, dateStr) {
    if (todo.repeat === 'none') return todo.date === dateStr;
    if (dateStr < todo.date) return false;
    const d = parse(dateStr), start = parse(todo.date);
    switch (todo.repeat) {
      case 'daily':   return true;
      case 'weekly':  return d.getDay() === start.getDay();
      case 'monthly': return d.getDate() === start.getDate();
    }
    return false;
  }
  function isDone(todo, dateStr) {
    return todo.repeat === 'none' ? !!todo.done : (todo.completedDates || []).includes(dateStr);
  }
  function toggleDone(todo, dateStr) {
    if (todo.repeat === 'none') { todo.done = !todo.done; }
    else {
      todo.completedDates = todo.completedDates || [];
      const i = todo.completedDates.indexOf(dateStr);
      i >= 0 ? todo.completedDates.splice(i, 1) : todo.completedDates.push(dateStr);
    }
    save(); render();
  }
  function todosOn(dateStr) {
    return todos.filter(t => occursOn(t, dateStr))
      .sort((a, b) => (a.time || '99:99').localeCompare(b.time || '99:99'));
  }
  // 期限切れ: 今日より前の未完了(繰り返しなしのみ)
  function overdueTodos() {
    const today = todayStr();
    return todos.filter(t => t.repeat === 'none' && !t.done && t.date < today)
      .sort((a, b) => a.date.localeCompare(b.date));
  }

  // ===== 描画 =====
  const $ = id => document.getElementById(id);

  function render() { renderCalendar(); renderSide(); renderOverdue(); }

  function renderCalendar() {
    const y = viewDate.getFullYear(), m = viewDate.getMonth();
    $('calTitle').textContent = `${y}年 ${m + 1}月`;
    const first = new Date(y, m, 1);
    const startOffset = first.getDay();
    const body = $('calBody');
    body.innerHTML = '';
    const today = todayStr();
    let cur = new Date(y, m, 1 - startOffset);
    for (let w = 0; w < 6; w++) {
      const tr = document.createElement('tr');
      for (let dow = 0; dow < 7; dow++) {
        const td = document.createElement('td');
        const ds = fmt(cur);
        const inMonth = cur.getMonth() === m;
        if (!inMonth) td.classList.add('other');
        if (ds === today) td.classList.add('today');
        if (ds === selectedDate) td.classList.add('selected');
        if (dow === 0) td.classList.add('sun-cell');
        if (dow === 6) td.classList.add('sat-cell');
        const num = document.createElement('div');
        num.className = 'day-num';
        num.textContent = cur.getDate();
        td.appendChild(num);

        const list = todosOn(ds);
        if (list.length) {
          const wrap = document.createElement('div');
          wrap.className = 'cell-todos';
          list.slice(0, 3).forEach(t => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            if (isDone(t, ds)) chip.classList.add('done');
            else if (ds < today) chip.classList.add('overdue');
            chip.textContent = (t.time ? t.time + ' ' : '') + t.title;
            chip.title = t.title;
            wrap.appendChild(chip);
          });
          if (list.length > 3) {
            const more = document.createElement('div');
            more.className = 'chip more';
            more.textContent = `+${list.length - 3}件`;
            wrap.appendChild(more);
          }
          td.appendChild(wrap);
        }
        td.addEventListener('click', () => { selectedDate = ds; render(); });
        tr.appendChild(td);
        cur.setDate(cur.getDate() + 1);
      }
      body.appendChild(tr);
    }
  }

  function labelOf(ds) {
    const d = parse(ds);
    const youbi = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
    return `${d.getMonth() + 1}/${d.getDate()}(${youbi})`;
  }
  const repeatLabel = { daily: '毎日', weekly: '毎週', monthly: '毎月' };

  function makeItem(t, ds, showDate) {
    const li = document.createElement('li');
    li.className = 'todo-item';
    const done = isDone(t, ds);
    if (done) li.classList.add('done');
    else if (ds < todayStr()) li.classList.add('overdue');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = done;
    cb.addEventListener('change', () => toggleDone(t, ds));

    const title = document.createElement('span');
    title.className = 'title';
    title.textContent = t.title;
    if (t.repeat !== 'none') {
      const tag = document.createElement('span');
      tag.className = 'repeat-tag';
      tag.textContent = '🔁' + repeatLabel[t.repeat];
      title.appendChild(document.createTextNode(' '));
      title.appendChild(tag);
    }

    const meta = document.createElement('span');
    meta.className = 'meta';
    meta.textContent = showDate ? labelOf(ds) : (t.time || '');

    const del = document.createElement('button');
    del.className = 'del';
    del.textContent = '✕';
    del.title = '削除';
    del.addEventListener('click', () => {
      if (t.repeat !== 'none' && !confirm(`「${t.title}」は繰り返しタスクです。すべて削除しますか?`)) return;
      todos = todos.filter(x => x.id !== t.id);
      save(); render();
    });

    li.append(cb, title, meta, del);
    return li;
  }

  function renderSide() {
    $('addDateLabel').textContent = labelOf(selectedDate);
    $('listDateLabel').textContent = labelOf(selectedDate);
    const ul = $('todoList');
    ul.innerHTML = '';
    const list = todosOn(selectedDate);
    if (!list.length) {
      ul.innerHTML = '<li class="empty">ToDoはありません</li>';
      return;
    }
    list.forEach(t => ul.appendChild(makeItem(t, selectedDate, false)));
  }

  function renderOverdue() {
    const list = overdueTodos();
    const badge = $('overdueBadge');
    const panel = $('overduePanel');
    if (!list.length) { badge.style.display = 'none'; panel.style.display = 'none'; return; }
    badge.style.display = 'inline-block';
    badge.textContent = `期限切れ ${list.length}件`;
    panel.style.display = 'block';
    const ul = $('overdueList');
    ul.innerHTML = '';
    list.forEach(t => ul.appendChild(makeItem(t, t.date, true)));
  }

  // ===== イベント =====
  $('addForm').addEventListener('submit', e => {
    e.preventDefault();
    const title = $('titleInput').value.trim();
    if (!title) return;
    todos.push({
      id: uid(), title,
      date: selectedDate,
      time: $('timeInput').value || null,
      repeat: $('repeatInput').value,
      done: false, completedDates: []
    });
    $('titleInput').value = '';
    $('timeInput').value = '';
    $('repeatInput').value = 'none';
    save(); render();
  });
  $('prevBtn').addEventListener('click', () => { viewDate.setMonth(viewDate.getMonth() - 1); render(); });
  $('nextBtn').addEventListener('click', () => { viewDate.setMonth(viewDate.getMonth() + 1); render(); });
  $('todayBtn').addEventListener('click', () => { viewDate = new Date(); selectedDate = todayStr(); render(); });

  // ===== 通知 =====
  function notifyToday() {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const ds = todayStr();
    const remain = todosOn(ds).filter(t => !isDone(t, ds));
    const over = overdueTodos();
    if (!remain.length && !over.length) return;
    const parts = [];
    if (remain.length) parts.push(`今日のToDo ${remain.length}件`);
    if (over.length) parts.push(`期限切れ ${over.length}件`);
    new Notification('🗓️ ToDoカレンダー', { body: parts.join(' / ') });
  }
  function updateNotifyBtn() {
    const btn = $('notifyBtn');
    if (!('Notification' in window)) { btn.style.display = 'none'; return; }
    if (Notification.permission === 'granted') btn.style.display = 'none';
  }
  $('notifyBtn').addEventListener('click', async () => {
    const perm = await Notification.requestPermission();
    updateNotifyBtn();
    if (perm === 'granted') notifyToday();
  });

  // 日付が変わったら再描画(開きっぱなし対策)
  let lastDay = todayStr();
  setInterval(() => {
    if (todayStr() !== lastDay) { lastDay = todayStr(); render(); notifyToday(); }
  }, 60000);

  updateNotifyBtn();
  render();
  notifyToday();
})();
</script>
</body>
</html>
